version: '3.8'

services:

  backend:
    build: ./backend
    container_name: vinted-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/best_model.keras:/app/best_model.keras
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: vinted-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
